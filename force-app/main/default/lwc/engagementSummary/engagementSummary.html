<template>
    <lightning-card title="Engagement Metrics" icon-name="standard:service_report">
        <div class="slds-p-around_medium">
            <!-- Grid System for Metrics -->
            <div class="slds-grid slds-wrap slds-gutters">
                
                <!-- Opportunity Amount -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-bottom_small">
                    <div class="slds-box slds-box_x-small slds-text-align_center slds-theme_shade">
                        <lightning-icon icon-name="utility:money" size="small" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-title slds-m-bottom_none">Total Opp Amount</p>
                        <h2 class="slds-text-heading_medium slds-hyphenate slds-wrap" title={totalAmount}>
                            <lightning-formatted-number value={totalAmount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                        </h2>
                    </div>
                </div>

                <!-- Completed Tasks -->
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                    <div class="slds-box slds-box_x-small slds-text-align_center slds-theme_shade">
                        <lightning-icon icon-name="utility:task" size="small" variant="success" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-title slds-m-bottom_none">Completed Tasks</p>
                        <h2 class="slds-text-heading_medium">{completedTasksCount}</h2>
                    </div>
                </div>

                <!-- Upcoming Events -->
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                    <div class="slds-box slds-box_x-small slds-text-align_center slds-theme_shade">
                        <lightning-icon icon-name="utility:event" size="small" variant="warning" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-title slds-m-bottom_none">Upcoming Events</p>
                        <h2 class="slds-text-heading_medium">{upcomingEventsCount}</h2>
                    </div>
                </div>

            </div>

            <!-- Action Button -->
            <div class="slds-m-top_large slds-text-align_center">
                <lightning-button 
                    label="Quick Follow-Up Task" 
                    onclick={handleFollowUp} 
                    variant="brand"
                    icon-name="utility:add"
                    class="slds-m-horizontal_x-small">
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
